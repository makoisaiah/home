<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理画面 | MyApp</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 60px);
    }
    .admin-sidebar {
      border-right: 1px solid var(--border);
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: .25rem;
    }
    .admin-sidebar h2 {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: .5rem;
    }
    .sidebar-btn {
      background: none;
      border: none;
      text-align: left;
      padding: .6rem .75rem;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: .9rem;
      color: var(--text);
      width: 100%;
      transition: background .15s;
    }
    .sidebar-btn:hover   { background: var(--surface); }
    .sidebar-btn.active  { background: var(--primary); color: #fff; font-weight: 600; }

    .admin-content { padding: 2rem; }
    .admin-content h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; }

    /* パネル */
    .panel { display: none; }
    .panel.active { display: block; }

    .edit-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .edit-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    .edit-group input[type="text"],
    .edit-group textarea {
      width: 100%;
      padding: .6rem .8rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .95rem;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
      background: var(--bg);
    }
    .edit-group input[type="text"]:focus,
    .edit-group textarea:focus { border-color: var(--primary); }
    .edit-group textarea { min-height: 80px; resize: vertical; }

    /* カラーピッカー */
    .color-row {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .color-row input[type="color"] {
      width: 44px;
      height: 44px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      padding: 2px;
      background: var(--bg);
    }
    .color-row input[type="text"] {
      width: 120px;
      padding: .6rem .8rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .9rem;
      font-family: monospace;
      outline: none;
    }
    .color-row input[type="text"]:focus { border-color: var(--primary); }

    /* フォントセレクト */
    .edit-group select {
      width: 100%;
      padding: .6rem .8rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .95rem;
      background: var(--bg);
      outline: none;
      cursor: pointer;
    }

    .save-bar {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: .75rem;
      align-items: center;
    }
    .toast {
      background: #1a202c;
      color: #fff;
      padding: .6rem 1rem;
      border-radius: var(--radius);
      font-size: .875rem;
      opacity: 0;
      transition: opacity .3s;
    }
    .toast.show { opacity: 1; }

    /* プレビュー */
    .preview-box {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-top: 1rem;
      background: var(--bg);
    }
    .preview-box h3 { font-size: .8rem; color: var(--muted); margin-bottom: .75rem; }

    .block-item {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      background: var(--bg);
      overflow: hidden;
    }
    .block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .block-label { font-weight: 700; font-size: .9rem; }
    .block-actions { display: flex; gap: .4rem; }
    .block-actions button {
      padding: .25rem .6rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      cursor: pointer;
      font-size: .8rem;
    }
    .block-actions .btn-danger { color: var(--danger); border-color: var(--danger); }
    .block-fields { padding: 1rem; display: flex; flex-direction: column; gap: .5rem; }
    .col-editor {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: .75rem;
      min-height: 60px;
    }
    .col-editor-header {
      font-size: .8rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: .5rem;
    }
    .col-block-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .5rem .75rem;
      margin-bottom: .5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .875rem;
    }
    .col-block-item .block-actions { display: flex; gap: .25rem; }
    .col-add-row { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .5rem; }
    .col-add-row button { font-size: .75rem; padding: .25rem .5rem; }
  </style>
</head>
<body>
<div id="page" style="display:none;">
  <header class="site-header">
    <a href="../index.html" class="logo">MyApp</a>
    <nav>
      <span style="font-size:.8rem;color:var(--muted);background:#fef3c7;padding:.25rem .6rem;border-radius:4px;font-weight:600;">管理者</span>
      <span id="user-email" class="user-email"></span>
      <button id="logout-btn" class="btn btn-outline">ログアウト</button>
    </nav>
  </header>

  <div class="admin-layout">
    <!-- サイドバー -->
    <aside class="admin-sidebar">
      <h2>管理メニュー</h2>
      <button class="sidebar-btn active" data-panel="page">🗂 ページ編集</button>
      <button class="sidebar-btn" data-panel="design">🎨 デザイン設定</button>
      <button class="sidebar-btn" data-panel="pages">🗂 ページ管理</button>
    </aside>

    <!-- メインコンテンツ -->
    <main class="admin-content">

      <!-- ページ編集パネル -->
      <div id="panel-page" class="panel active">
        <h1>ページ編集 — トップページ</h1>
      
        <div class="edit-group" style="display:flex;gap:.5rem;flex-wrap:wrap;">
          <span style="font-size:.85rem;font-weight:600;color:var(--muted);width:100%;">ブロックを追加</span>
          <button onclick="addBlock('hero')"    class="btn btn-outline">🦸 ヒーロー</button>
          <button onclick="addBlock('text')"    class="btn btn-outline">📝 テキスト</button>
          <button onclick="addBlock('image')"   class="btn btn-outline">🖼 画像</button>
          <button onclick="addBlock('button')"  class="btn btn-outline">🔘 ボタン</button>
          <button onclick="addBlock('two-col')" class="btn btn-outline">⬛⬛ 2カラム</button>
        </div>
      
        <div id="block-list"></div>
      
        <button id="save-page-btn" onclick="savePage()" class="btn btn-primary btn-block"
                style="margin-top:1rem;">ページを保存</button>
      </div>


      <!-- デザイン設定パネル -->
      <div id="panel-design" class="panel">
        <h1>デザイン設定</h1>

        <div class="edit-group">
          <label>メインカラー（ボタン・リンク）</label>
          <div class="color-row">
            <input type="color" id="color-primary" value="#4f46e5" />
            <input type="text"  id="color-primary-hex" value="#4f46e5" maxlength="7" />
          </div>
        </div>

        <div class="edit-group">
          <label>背景色</label>
          <div class="color-row">
            <input type="color" id="color-bg" value="#ffffff" />
            <input type="text"  id="color-bg-hex" value="#ffffff" maxlength="7" />
          </div>
        </div>

        <div class="edit-group">
          <label>本文フォント</label>
          <select id="font-body">
            <option value="'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif">デフォルト（ゴシック）</option>
            <option value="'Georgia', 'Times New Roman', serif">明朝系（Georgia）</option>
            <option value="'Courier New', monospace">等幅（Courier）</option>
          </select>
        </div>

        <div class="edit-group">
          <label>フォントサイズ基準</label>
          <select id="font-size">
            <option value="14px">小（14px）</option>
            <option value="16px" selected>標準（16px）</option>
            <option value="18px">大（18px）</option>
          </select>
        </div>

        <div class="preview-box">
          <h3>プレビュー</h3>
          <div id="design-preview" style="padding:1rem;border-radius:6px;transition:all .3s;">
            <p style="font-weight:700;margin-bottom:.4rem;">見出しサンプル</p>
            <p>本文テキストのサンプルです。フォントや色の変化を確認できます。</p>
            <button class="btn btn-primary" style="margin-top:.75rem;">ボタンサンプル</button>
          </div>
        </div>
      </div>

      <!-- ページ管理パネル -->
      <div id="panel-pages" class="panel">
        <h1>ページ管理</h1>
      
        <div class="edit-group" style="display:flex;gap:.5rem;align-items:center;">
          <input type="text" id="new-page-title" placeholder="ページ名" style="flex:1;" />
          <input type="text" id="new-page-slug"  placeholder="slug（例: about）" style="flex:1;" />
          <button onclick="addPage()" class="btn btn-primary" style="white-space:nowrap;">追加</button>
        </div>
      
        <div id="pages-list"></div>
      </div>
      
    </main>
  </div>

  <!-- 保存バー -->
  <div class="save-bar" style="display:none;">
    <span id="toast" class="toast">保存しました ✓</span>
    <button id="save-btn" class="btn btn-primary">変更を保存</button>
  </div>
</div>

<script src="../js/auth.js"></script>
<script>
// ── 認証チェック ──────────────────────────────────────────────────────────
requireAdmin().then(user => {
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('page').style.display = '';
  loadSettings();
  loadPageEditor(); 
  loadPagesManager(); 
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await signOut();
  window.location.href = '../pages/login.html';
});

// ── サイドバー切り替え ────────────────────────────────────────────────────
document.querySelectorAll('.sidebar-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.panel).classList.add('active');

     // デザイン設定パネルのときだけ「変更を保存」を表示
    document.querySelector('.save-bar').style.display =
      btn.dataset.panel === 'design' ? 'flex' : 'none';
  });
});

// ── カラーピッカー同期 ────────────────────────────────────────────────────
function syncColor(pickerId, hexId, cssVar) {
  const picker = document.getElementById(pickerId);
  const hex    = document.getElementById(hexId);
  const preview = document.getElementById('design-preview');

  picker.addEventListener('input', () => {
    hex.value = picker.value;
    preview.style.setProperty(cssVar, picker.value);
  });
  hex.addEventListener('input', () => {
    if (/^#[0-9a-fA-F]{6}$/.test(hex.value)) {
      picker.value = hex.value;
      preview.style.setProperty(cssVar, hex.value);
    }
  });
}
syncColor('color-primary', 'color-primary-hex', '--primary');
syncColor('color-bg',      'color-bg-hex',      'background');

document.getElementById('font-body').addEventListener('change', e => {
  document.getElementById('design-preview').style.fontFamily = e.target.value;
});
document.getElementById('font-size').addEventListener('change', e => {
  document.getElementById('design-preview').style.fontSize = e.target.value;
});


// ── 設定の保存・読み込み（Supabase）─────────────────────────────────────

async function loadSettings() {
  const sb = await waitForClient();
  const { data, error } = await sb.from('site_settings').select('key, value');
  if (error || !data) return;

  const s = Object.fromEntries(data.map(r => [r.key, r.value]));
  if (s.siteName)   document.getElementById('txt-site-name').value  = s.siteName;
  if (s.heroTitle)  document.getElementById('txt-hero-title').value = s.heroTitle;
  if (s.heroSub)    document.getElementById('txt-hero-sub').value   = s.heroSub;
  if (s.cta)        document.getElementById('txt-cta').value        = s.cta;
  if (s.primary)  { document.getElementById('color-primary').value    = s.primary;
                    document.getElementById('color-primary-hex').value = s.primary; }
  if (s.bg)       { document.getElementById('color-bg').value         = s.bg;
                    document.getElementById('color-bg-hex').value      = s.bg; }
  if (s.fontBody)   document.getElementById('font-body').value  = s.fontBody;
  if (s.fontSize)   document.getElementById('font-size').value  = s.fontSize;
}

document.getElementById('save-btn').addEventListener('click', async () => {
  const sb = await waitForClient();
  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中…';

  const settings = {
    primary:   document.getElementById('color-primary').value,
    bg:        document.getElementById('color-bg').value,
    fontBody:  document.getElementById('font-body').value,
    fontSize:  document.getElementById('font-size').value,
  };

  const rows = Object.entries(settings).map(([key, value]) => ({
    key, value, updated_at: new Date().toISOString()
  }));

  const { error } = await sb
    .from('site_settings')
    .upsert(rows, { onConflict: 'key' });

  saveBtn.disabled = false;
  saveBtn.textContent = '変更を保存';

  const toast = document.getElementById('toast');
  if (error) {
    toast.textContent = '保存に失敗しました: ' + error.message;
    toast.style.background = '#e53e3e';
  } else {
    toast.textContent = '保存しました ✓';
    toast.style.background = '#1a202c';
  }
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
});

// ── ページエディタ ────────────────────────────────────────────────────────

let blocks = [];   // 現在編集中のブロック配列

const BLOCK_TYPES = {
  hero:    '🦸 ヒーロー',
  text:    '📝 テキスト',
  image:   '🖼 画像',
  button:  '🔘 ボタン',
  'two-col': '⬛⬛ 2カラム',
  'three-col':'⬛⬛⬛ 3カラム',
};

async function loadPageEditor() {
  const sb = await waitForClient();
  const { data } = await sb.from('pages').select('blocks').eq('id','index').single();
  blocks = data?.blocks ?? [
    { type:'hero', title:'ようこそ MyApp へ',
      sub:'ログインすると会員専用コンテンツにアクセスできます。',
      cta:'無料で始める', ctaUrl:'pages/signup.html' }
  ];
  renderEditor();
}

function renderEditor() {
  const container = document.getElementById('block-list');
  if (!container) return;
  container.innerHTML = blocks.map((b, i) => `
    <div class="block-item" data-index="${i}">
      <div class="block-header">
        <span class="block-label">${BLOCK_TYPES[b.type] ?? b.type}</span>
        <div class="block-actions">
          <button onclick="moveBlock(${i},-1)" ${i===0?'disabled':''}>↑</button>
          <button onclick="moveBlock(${i}, 1)" ${i===blocks.length-1?'disabled':''}>↓</button>
          <button onclick="removeBlock(${i})" class="btn-danger">削除</button>
        </div>
      </div>
      <div class="block-fields">${renderFields(b, i)}</div>
    </div>
  `).join('');
}

function renderFields(b, i, colParent, colKey, colIndex) {
  const onInput = (key) => colParent !== undefined
    ? `updateColBlock(${colParent},'${colKey}',${colIndex},'${key}',this.value)`
    : `updateBlock(${i},'${key}',this.value)`;

  const field = (label, key, type='text', extra='') =>
    `<div class="edit-group">
       <label>${label}</label>
       <input type="${type}" value="${esc2(b[key])}"
              oninput="${onInput(key)}" ${extra}/>
     </div>`;
  const textarea = (label, key) =>
    `<div class="edit-group">
       <label>${label}</label>
       <textarea oninput="${onInput(key)}">${esc2(b[key])}</textarea>
     </div>`;

  switch (b.type) {
    case 'hero':
      return field('見出し','title') + field('サブテキスト','sub')
           + field('ボタンテキスト','cta') + field('ボタンURL','ctaUrl');

    case 'text':
      return field('見出し（省略可）','heading') + textarea('本文','body');

    case 'image': {
      const uploadHandler = colParent !== undefined
        ? `uploadImageToCol(event,${colParent},'${colKey}',${colIndex})`
        : `uploadImage(event,${i})`;
    
      const fileName = b.url
        ? b.url.split('/').pop().replace(/^\d+_/, '')
        : null;
    
      const fileField = b.url
        ? `<div class="edit-group">
             <label>画像</label>
             <div style="display:flex;align-items:center;gap:.75rem;">
               <span style="font-size:.875rem;color:var(--text);
                            background:var(--surface);padding:.4rem .75rem;
                            border-radius:var(--radius);border:1px solid var(--border);
                            flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
                 📎 ${esc2(fileName)}
               </span>
               <label class="btn btn-outline" style="cursor:pointer;white-space:nowrap;">
                 変更
                 <input type="file" accept="image/*" onchange="${uploadHandler}"
                        style="display:none;"/>
               </label>
             </div>
           </div>`
        : `<div class="edit-group">
             <label>画像</label>
             <input type="file" accept="image/*" onchange="${uploadHandler}"/>
           </div>`;
    
      return fileField
           + field('ALTテキスト','alt')
           + field('キャプション（省略可）','caption')
           + field('リンクURL（省略可）','link')
           + `<div class="edit-group"><label>配置</label>
                <select onchange="${onInput('align')}">
                  <option value="center" ${b.align==='center'?'selected':''}>中央</option>
                  <option value="left"   ${b.align==='left'  ?'selected':''}>左</option>
                  <option value="right"  ${b.align==='right' ?'selected':''}>右</option>
                </select></div>`;
    }

    case 'button':
      return field('ボタンテキスト','label') + field('URL','url')
           + `<div class="edit-group"><label>スタイル</label>
                <select onchange="${onInput('style')}">
                  <option value="primary" ${b.style==='primary'?'selected':''}>塗りつぶし</option>
                  <option value="outline" ${b.style==='outline'?'selected':''}>枠線</option>
                </select></div>`;

    case 'two-col':
    case 'three-col': {
      const cols   = b.type === 'three-col' ? 3 : 2;
      const labels = ['左', '中', '右'];
      const keys = b.type === 'three-col'
        ? ['left', 'center', 'right']
        : ['left', 'right'];

      const switchBtn = b.type === 'two-col'
        ? `<button class="btn btn-outline" style="font-size:.8rem;padding:.25rem .6rem;"
                   onclick="switchColType(${i},'three-col')">3カラムに変更</button>`
        : `<button class="btn btn-outline" style="font-size:.8rem;padding:.25rem .6rem;"
                   onclick="switchColType(${i},'two-col')">2カラムに変更</button>`;

      const colsHtml = keys.map((key, ci) => `
        <div>
          <div class="col-editor-header">${labels[ci]}カラム</div>
          <div class="col-editor" id="col-${i}-${key}">
            ${(b[key] ?? []).map((cb, cbi) => `
              <div class="col-block-item">
                <span>${BLOCK_TYPES[cb.type] ?? cb.type}</span>
                <div class="block-actions">
                  <button onclick="moveColBlock(${i},'${key}',${cbi},-1)" ${cbi===0?'disabled':''}>↑</button>
                  <button onclick="moveColBlock(${i},'${key}',${cbi}, 1)" ${cbi===(b[key].length-1)?'disabled':''}>↓</button>
                  <button onclick="removeColBlock(${i},'${key}',${cbi})" class="btn-danger">削除</button>
                </div>
              </div>
              <div class="block-fields" style="padding:.5rem;background:var(--surface);border-radius:var(--radius);margin-bottom:.5rem;">
                ${renderFields(cb, -1, i, key, cbi)}
              </div>
            `).join('')}
            <div class="col-add-row">
              ${Object.keys(BLOCK_TYPES).filter(t=>t!=='two-col'&&t!=='three-col').map(t =>
                `<button class="btn btn-outline" onclick="addColBlock(${i},'${key}','${t}')">${BLOCK_TYPES[t]}</button>`
              ).join('')}
            </div>
          </div>
        </div>
      `).join('');

      const gridCols = cols === 3 ? '1fr 1fr 1fr' : '1fr 1fr';
      return `
        <div style="margin-bottom:.75rem;">${switchBtn}</div>
        <div style="display:grid;grid-template-columns:${gridCols};gap:1rem;">
          ${colsHtml}
        </div>`;
    }

    default: return '';
  }
}
  
function esc2(str = '') {
  return String(str).replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function updateBlock(i, key, value) {
  blocks[i][key] = value;
}

function moveBlock(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= blocks.length) return;
  [blocks[i], blocks[j]] = [blocks[j], blocks[i]];
  renderEditor();
}

function removeBlock(i) {
  if (!confirm('このブロックを削除しますか？')) return;
  blocks.splice(i, 1);
  renderEditor();
}

function addBlock(type) {
  const defaults = {
    hero:    { type:'hero', title:'', sub:'', cta:'', ctaUrl:'' },
    text:    { type:'text', heading:'', body:'' },
    image:   { type:'image', url:'', alt:'', caption:'', align:'center' },
    button:  { type:'button', label:'', url:'', style:'primary' },
    'two-col': { type:'two-col', left:[], right:[] },
  };
  blocks.push(defaults[type]);
  renderEditor();
}

async function uploadImage(event, i) {
  const file = event.target.files[0];
  if (!file) return;
  const sb   = await waitForClient();
  const path = `public/${Date.now()}_${file.name}`;
  const { error } = await sb.storage.from('images').upload(path, file);
  if (error) { alert('アップロード失敗: ' + error.message); return; }
  const { data } = sb.storage.from('images').getPublicUrl(path);
  updateBlock(i, 'url', data.publicUrl);

  // 再描画せず URL フィールドだけ更新
  const urlInput = document.querySelector(`[data-index="${i}"] input[type="text"]`);
  if (urlInput) urlInput.value = data.publicUrl;

  const toast = document.getElementById('toast');
  toast.textContent = 'アップロード完了 ✓';
  toast.style.background = '#1a202c';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

async function savePage() {
  const sb  = await waitForClient();
  const btn = document.getElementById('save-page-btn');
  btn.disabled = true;
  btn.textContent = '保存中…';

  const { error } = await sb.from('pages').upsert(
    { id:'index', blocks, updated_at: new Date().toISOString() },
    { onConflict:'id' }
  );

  btn.disabled = false;
  btn.textContent = 'ページを保存';

  const toast = document.getElementById('toast');
  toast.textContent  = error ? '保存失敗: '+error.message : 'ページを保存しました ✓';
  toast.style.background = error ? '#e53e3e' : '#1a202c';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function switchColType(i, newType) {
  blocks[i].type = newType;
  if (newType === 'three-col' && !blocks[i].center) blocks[i].center = [];
  renderEditor();
}

function addColBlock(i, key, type) {
  const defaults = {
    hero:   { type:'hero',   title:'', sub:'', cta:'', ctaUrl:'' },
    text:   { type:'text',   heading:'', body:'' },
    image:  { type:'image',  url:'', alt:'', caption:'', align:'center' },
    button: { type:'button', label:'', url:'', style:'primary' },
  };
  if (!blocks[i][key]) blocks[i][key] = [];
  blocks[i][key].push(defaults[type]);
  renderEditor();
}

function removeColBlock(i, key, ci) {
  if (!confirm('削除しますか？')) return;
  blocks[i][key].splice(ci, 1);
  renderEditor();
}

function moveColBlock(i, key, ci, dir) {
  const arr = blocks[i][key];
  const j   = ci + dir;
  if (j < 0 || j >= arr.length) return;
  [arr[ci], arr[j]] = [arr[j], arr[ci]];
  renderEditor();
}

function updateColBlock(i, key, ci, field, value) {
  blocks[i][key][ci][field] = value;
}

async function uploadImageToCol(event, i, key, ci) {
  const file = event.target.files[0];
  if (!file) return;
  const sb   = await waitForClient();
  const path = `public/${Date.now()}_${file.name}`;
  const { error } = await sb.storage.from('images').upload(path, file);
  if (error) { alert('アップロード失敗: ' + error.message); return; }
  const { data } = sb.storage.from('images').getPublicUrl(path);
  updateColBlock(i, key, ci, 'url', data.publicUrl);

  const toast = document.getElementById('toast');
  toast.textContent = 'アップロード完了 ✓';
  toast.style.background = '#1a202c';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── ページ管理 ────────────────────────────────────────────────────────────

let sitePages = [];

async function loadPagesManager() {
  const sb = await waitForClient();
  const { data } = await sb
    .from('site_pages')
    .select('id, slug, title, parent_id, sort_order, is_members_only')
    .order('sort_order');
  sitePages = data ?? [];

  // page.html から遷移してきた場合は該当ページを開く
  const editId    = sessionStorage.getItem('editPageId');
  const editTitle = sessionStorage.getItem('editPageTitle');
  if (editId) {
    sessionStorage.removeItem('editPageId');
    sessionStorage.removeItem('editPageTitle');
    editPageBlocks(editId, editTitle);
  }
  renderPagesManager();
}

function renderPagesManager() {
  const container = document.getElementById('pages-list');
  if (!container) return;

  if (sitePages.length === 0) {
    container.innerHTML = '<p style="color:var(--muted);padding:1rem 0;">ページがまだありません</p>';
    return;
  }

  container.innerHTML = sitePages.map(p => `
    <div class="block-item">
      <div class="block-header">
        <span class="block-label">${esc2(p.title)}</span>
        <div class="block-actions">
          <button onclick="editPageBlocks('${p.id}','${esc2(p.title)}')" class="btn btn-outline" style="font-size:.8rem;">ブロック編集</button>
          <button onclick="deletePage('${p.id}')" class="btn-danger">削除</button>
        </div>
      </div>
      <div class="block-fields" style="gap:.75rem;">
        <div class="edit-group">
          <label>ページ名</label>
          <input type="text" value="${esc2(p.title)}"
                 onchange="updatePage('${p.id}','title',this.value)" />
        </div>
        <div class="edit-group">
          <label>slug（URL）</label>
          <input type="text" value="${esc2(p.slug)}"
                 onchange="updatePage('${p.id}','slug',this.value)" />
        </div>
        <div class="edit-group">
          <label>親ページ</label>
          <select onchange="updatePage('${p.id}','parent_id',this.value)">
            <option value="">なし（トップレベル）</option>
            ${sitePages.filter(op => op.id !== p.id).map(op =>
              `<option value="${op.id}" ${p.parent_id===op.id?'selected':''}>${esc2(op.title)}</option>`
            ).join('')}
          </select>
        </div>
        <div class="edit-group" style="display:flex;align-items:center;gap:.75rem;">
          <input type="checkbox" id="members-${p.id}"
                 ${p.is_members_only?'checked':''}
                 onchange="updatePage('${p.id}','is_members_only',this.checked)" />
          <label for="members-${p.id}" style="margin:0;color:var(--text);">会員限定ページ</label>
        </div>
      </div>
    </div>
  `).join('');
}

async function addPage() {
  const title = document.getElementById('new-page-title').value.trim();
  const slug  = document.getElementById('new-page-slug').value.trim();
  if (!title || !slug) { alert('ページ名とslugを入力してください'); return; }

  const sb = await waitForClient();
  const { error } = await sb.from('site_pages').insert({
    title, slug, sort_order: sitePages.length, blocks: []
  });
  if (error) { alert('追加失敗: ' + error.message); return; }

  document.getElementById('new-page-title').value = '';
  document.getElementById('new-page-slug').value  = '';
  await loadPagesManager();
}

async function updatePage(id, field, value) {
  const sb = await waitForClient();
  await sb.from('site_pages').update({ [field]: value }).eq('id', id);
  const page = sitePages.find(p => p.id === id);
  if (page) page[field] = value;
  renderPagesManager();
}

async function deletePage(id) {
  if (!confirm('このページを削除しますか？')) return;
  const sb = await waitForClient();
  await sb.from('site_pages').delete().eq('id', id);
  await loadPagesManager();
}

function editPageBlocks(id, title) {
  // ページ編集パネルに切り替えて該当ページを読み込む
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-panel="page"]').classList.add('active');
  document.getElementById('panel-page').classList.add('active');
  loadPageById(id, title);
}

let currentPageId = 'index';

async function loadPageById(id, title) {
  const sb = await waitForClient();
  const { data } = await sb.from('site_pages').select('blocks').eq('id', id).single();
  currentPageId = id;
  document.querySelector('#panel-page h1').textContent = 'ページ編集 — ' + title;
  blocks = data?.blocks ?? [];
  renderEditor();
}

async function savePage() {
  const sb  = await waitForClient();
  const btn = document.getElementById('save-page-btn');
  btn.disabled = true;
  btn.textContent = '保存中…';

  // index か site_pages かを判断して保存先を変える
  let error;
  if (currentPageId === 'index') {
    ({ error } = await sb.from('pages').upsert(
      { id:'index', blocks, updated_at: new Date().toISOString() },
      { onConflict:'id' }
    ));
  } else {
    ({ error } = await sb.from('site_pages')
      .update({ blocks, updated_at: new Date().toISOString() })
      .eq('id', currentPageId));
  }

  btn.disabled = false;
  btn.textContent = 'ページを保存';

  const toast = document.getElementById('toast');
  toast.textContent  = error ? '保存失敗: '+error.message : 'ページを保存しました ✓';
  toast.style.background = error ? '#e53e3e' : '#1a202c';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}
  
  </script>
