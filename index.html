<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyApp</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo">MyApp</a>
    <nav>
      <a href="pages/login.html" class="btn btn-outline">ログイン</a>
      <a href="pages/signup.html" class="btn btn-primary">新規登録</a>
    </nav>
  </header>

  <main class="hero">
    <h1>ようこそ MyApp へ</h1>
    <p>ログインすると会員専用コンテンツにアクセスできます。</p>
    <a href="pages/signup.html" class="btn btn-primary btn-lg">無料で始める</a>
  </main>

  <script src="js/auth.js"></script>
  <script>
  async function applySettings() {
    const sb = await waitForClient();
    const { data, error } = await sb.from('site_settings').select('key, value');
    if (error || !data) return;

    const s = Object.fromEntries(data.map(r => [r.key, r.value]));

    if (s.siteName) {
      document.title = s.siteName;
      document.querySelector('.logo').textContent = s.siteName;
    }
    if (s.heroTitle) document.querySelector('.hero h1').textContent = s.heroTitle;
    if (s.heroSub)   document.querySelector('.hero p').textContent  = s.heroSub;
    if (s.cta)       document.querySelector('.hero .btn-lg').textContent = s.cta;

    const root = document.documentElement;
    if (s.primary) root.style.setProperty('--primary', s.primary);
    if (s.bg)      root.style.setProperty('--bg', s.bg);
    if (s.fontBody) document.body.style.fontFamily = s.fontBody;
    if (s.fontSize) document.body.style.fontSize   = s.fontSize;
  }

  applySettings();
  </script>
</body>
</html>
