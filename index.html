<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyApp</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #page { }
    .img-link {
      display: inline-block;
      cursor: pointer;
      text-decoration: none;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .img-link img {
      transition: transform .2s, box-shadow .2s;
    }
    .img-link:hover img {
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
    }
    .img-link:active img {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      opacity: .85;
    }
  </style>
  <style id="dynamic-vars"></style>
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo" id="site-name">MyApp</a>
    <nav id="header-nav">
      <a href="pages/login.html" class="btn btn-outline">ログイン</a>
      <a href="pages/signup.html" class="btn btn-primary">新規登録</a>
    </nav>
  </header>

  <div id="page"></div>

  <script src="js/auth.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/nav.js"></script>
  <script>
  async function init() {
    // 前回のデザイン設定をキャッシュから即時適用
    const cached = localStorage.getItem('designCache');
    if (cached) {
      document.getElementById('dynamic-vars').textContent = cached;
    }
    
    document.getElementById('page').style.display = 'none';
    const sb = await waitForClient();

    // デザイン設定を適用
    const { data: settings } = await sb.from('site_settings').select('key, value');
    if (settings) {
      const s = Object.fromEntries(settings.map(r => [r.key, r.value]));
      if (s.siteName) {
        document.title = s.siteName;
        document.getElementById('site-name').textContent = s.siteName;
            }
      const vars = `
        :root {
          ${s.primary  ? `--primary: ${s.primary};`  : ''}
          ${s.bg       ? `--bg: ${s.bg};`            : ''}
        }
        body {
          ${s.fontBody ? `font-family: ${s.fontBody};` : ''}
          ${s.fontSize ? `font-size: ${s.fontSize};`   : ''}
        }
      `;
      document.getElementById('dynamic-vars').textContent = vars;
      localStorage.setItem('designCache', vars); 
      }

    // ヘッダーのログイン状態を更新
    await updateHeaderNav(sb);

    // ページブロックを取得して描画
    const { data: page } = await sb
      .from('pages')
      .select('blocks')
      .eq('id', 'index')
      .single();

    const blocks = page?.blocks ?? defaultBlocks();
    document.getElementById('page').innerHTML = renderBlocks(blocks);
    document.getElementById('page').style.display = '';
  }

  function defaultBlocks() {
    return [
      { type: 'hero', title: 'ようこそ MyApp へ',
        sub: 'ログインすると会員専用コンテンツにアクセスできます。',
        cta: '無料で始める', ctaUrl: 'pages/signup.html' }
    ];
  }

  async function updateHeaderNav(sb) {
    const { data: { user } } = await sb.auth.getUser();
    const nav = document.getElementById('header-nav');
    if (!user) return;
  
    const { data: profile } = await sb
      .from('profiles')
      .select('role')
      .eq('id', user.id)
      .single();
  
    const isAdmin = profile?.role === 'admin';
    nav.innerHTML = `
      <span class="user-email">${user.email}</span>
      ${isAdmin ? '<a href="pages/admin.html" class="btn btn-outline">管理画面</a>' : ''}
      <button onclick="handleLogout()" class="btn btn-outline">ログアウト</button>
    `;
  }
  
  async function handleLogout() {
    await signOut();
    window.location.reload();
  }

  init();
  </script>
</body>
</html>
