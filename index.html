<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyApp</title>
  <link rel="stylesheet" href="css/style.css" />
  <style id="dynamic-vars"></style>
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo" id="site-name">MyApp</a>
    <nav>
      <a href="pages/login.html" class="btn btn-outline">ログイン</a>
      <a href="pages/signup.html" class="btn btn-primary">新規登録</a>
    </nav>
  </header>

  <div id="page"></div>

  <script src="js/auth.js"></script>
  <script src="js/renderer.js"></script>
  <script>
  async function init() {
    // 前回のデザイン設定をキャッシュから即時適用
    const cached = localStorage.getItem('designCache');
    if (cached) {
      document.getElementById('dynamic-vars').textContent = cached;
    }
    
    document.getElementById('page').style.display = 'none';
    const sb = await waitForClient();

    // デザイン設定を適用
    const { data: settings } = await sb.from('site_settings').select('key, value');
    if (settings) {
      const s = Object.fromEntries(settings.map(r => [r.key, r.value]));
      if (s.siteName) {
        document.title = s.siteName;
        document.getElementById('site-name').textContent = s.siteName;
            }
      const vars = `
        :root {
          ${s.primary  ? `--primary: ${s.primary};`  : ''}
          ${s.bg       ? `--bg: ${s.bg};`            : ''}
        }
        body {
          ${s.fontBody ? `font-family: ${s.fontBody};` : ''}
          ${s.fontSize ? `font-size: ${s.fontSize};`   : ''}
        }
      `;
      document.getElementById('dynamic-vars').textContent = vars;
      localStorage.setItem('designCache', vars); 
      }

    // ページブロックを取得して描画
    const { data: page } = await sb
      .from('pages')
      .select('blocks')
      .eq('id', 'index')
      .single();

    const blocks = page?.blocks ?? defaultBlocks();
    document.getElementById('page').innerHTML = renderBlocks(blocks);
    document.getElementById('page').style.display = '';
  }

  function defaultBlocks() {
    return [
      { type: 'hero', title: 'ようこそ MyApp へ',
        sub: 'ログインすると会員専用コンテンツにアクセスできます。',
        cta: '無料で始める', ctaUrl: 'pages/signup.html' }
    ];
  }

  init();
  </script>
</body>
</html>
