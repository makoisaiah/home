<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <link rel="stylesheet" href="css/style.css" />
  <style id="dynamic-vars"></style>
  <style>
    .img-link {
      display: inline-block;
      cursor: pointer;
      text-decoration: none;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .img-link img { transition: transform .2s, box-shadow .2s; }
    .img-link:hover img {
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
    }
    .img-link:active img {
      transform: scale(0.97);
      opacity: .85;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo" id="site-name">MyApp</a>
    <nav id="header-nav">
      <a href="pages/login.html" class="btn btn-outline">ログイン</a>
      <a href="pages/signup.html" class="btn btn-primary">新規登録</a>
    </nav>
  </header>

  <div id="page"></div>

  <script src="js/auth.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/nav.js"></script>
  <script>
  async function init() {
    const sb = await waitForClient();

    // デザイン設定を適用（キャッシュで即時、その後Supabaseで更新）
    const cached = localStorage.getItem('designCache');
    if (cached) document.getElementById('dynamic-vars').textContent = cached;

    const { data: settings } = await sb.from('site_settings').select('key, value');
    if (settings) {
      const s = Object.fromEntries(settings.map(r => [r.key, r.value]));
      if (s.siteName) document.getElementById('site-name').textContent = s.siteName;
      const vars = `
        :root {
          ${s.primary ? `--primary: ${s.primary};` : ''}
          ${s.bg      ? `--bg: ${s.bg};`           : ''}
        }
        body {
          ${s.fontBody ? `font-family: ${s.fontBody};` : ''}
          ${s.fontSize ? `font-size: ${s.fontSize};`   : ''}
        }
      `;
      document.getElementById('dynamic-vars').textContent = vars;
      localStorage.setItem('designCache', vars);
    }

    // ヘッダーのログイン状態を更新
    await updateHeaderNav(sb);

    // slug からページを取得
    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) { showError('ページが指定されていません'); return; }

    const { data: pageData } = await sb
      .from('site_pages')
      .select('id, title, blocks, min_role')
      .eq('slug', slug)
      .single();

    if (!pageData) { showError('ページが見つかりません'); return; }

    // ロールチェック
    const userRole = await getCurrentRole();
    if (roleLevel(userRole) < roleLevel(pageData.min_role ?? 'guest')) {
      if (userRole === 'guest') {
        showError('このページはログインが必要です。', true);
      } else {
        showError('このページを閲覧するには上位プランへのアップグレードが必要です。', false);
      }
      return;
    }

    document.title = pageData.title + ' | ' + document.getElementById('site-name').textContent;
    document.getElementById('page').innerHTML = renderBlocks(pageData.blocks);

    // 管理者なら編集ボタンを表示
    const { data: { user } } = await sb.auth.getUser();
    if (user) {
      const { data: profile } = await sb
        .from('profiles')
        .select('role')
        .eq('id', user.id)
        .single();

      if (profile?.role === 'admin') {
        const editBar = document.createElement('div');
        editBar.style.cssText = 'position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;';
        editBar.innerHTML = `
          <a href="pages/admin.html"
             onclick="sessionStorage.setItem('editPageId','${pageData.id}');sessionStorage.setItem('editPageTitle','${escNav(pageData.title)}')"
             class="btn btn-primary">✏️ このページを編集</a>
        `;
        document.body.appendChild(editBar);
      }
    }
  }

  async function updateHeaderNav(sb) {
    const { data: { user } } = await sb.auth.getUser();
    const nav = document.getElementById('header-nav');
    if (!user) return;

    const { data: profile } = await sb
      .from('profiles')
      .select('role')
      .eq('id', user.id)
      .single();

    const isAdmin = profile?.role === 'admin';
    nav.innerHTML = `
      <span class="user-email">${user.email}</span>
      ${isAdmin ? '<a href="pages/admin.html" class="btn btn-outline">管理画面</a>' : ''}
      <button onclick="handleLogout()" class="btn btn-outline">ログアウト</button>
    `;
  }

  async function handleLogout() {
    await signOut();
    window.location.reload();
  }

  function showError(msg, showLogin = false) {
    document.getElementById('page').innerHTML =
      `<div class="container" style="padding:4rem 1.5rem;text-align:center;">
         <p style="color:var(--muted);font-size:1.1rem;">${msg}</p>
         <div style="display:flex;gap:1rem;justify-content:center;margin-top:1.5rem;">
           <a href="index.html" class="btn btn-outline">トップへ戻る</a>
           ${showLogin ? '<a href="pages/login.html" class="btn btn-primary">ログイン</a>' : ''}
           ${!showLogin && msg.includes('アップグレード') ? '<a href="pages/upgrade.html" class="btn btn-primary">プランを確認する</a>' : ''}
         </div>
       </div>`;
  }

  init();
  </script>
</body>
</html>
