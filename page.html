<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <link rel="stylesheet" href="css/style.css" />
  <style id="dynamic-vars"></style>
  <style>
    .img-link {
      display: inline-block;
      cursor: pointer;
      text-decoration: none;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .img-link img { transition: transform .2s, box-shadow .2s; }
    .img-link:hover img {
      transform: scale(1.03);
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
    }
    .img-link:active img {
      transform: scale(0.97);
      opacity: .85;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="logo" id="site-name">MyApp</a>
    <nav>
      <a href="pages/login.html" id="nav-login" class="btn btn-outline">ログイン</a>
      <a href="pages/signup.html" id="nav-signup" class="btn btn-primary">新規登録</a>
    </nav>
  </header>

  <div id="page"></div>

  <script src="js/auth.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/nav.js"></script>
  <script>
  async function init() {
    const sb = await waitForClient();

    // デザイン設定を適用
    const cached = localStorage.getItem('designCache');
    if (cached) document.getElementById('dynamic-vars').textContent = cached;

    const { data: settings } = await sb.from('site_settings').select('key, value');
    if (settings) {
      const s = Object.fromEntries(settings.map(r => [r.key, r.value]));
      if (s.siteName) {
        document.getElementById('site-name').textContent = s.siteName;
      }
      const vars = `
        :root {
          ${s.primary ? `--primary: ${s.primary};` : ''}
          ${s.bg      ? `--bg: ${s.bg};`           : ''}
        }
        body {
          ${s.fontBody ? `font-family: ${s.fontBody};` : ''}
          ${s.fontSize ? `font-size: ${s.fontSize};`   : ''}
        }
      `;
      document.getElementById('dynamic-vars').textContent = vars;
      localStorage.setItem('designCache', vars);
    }

    // ログイン状態によってヘッダーを切り替え
    const { data: { user } } = await sb.auth.getUser();
    if (user) {
      document.getElementById('nav-login').style.display  = 'none';
      document.getElementById('nav-signup').style.display = 'none';
    }

    // slug からページを取得
    const slug = new URLSearchParams(location.search).get('slug');
    if (!slug) { showError('ページが指定されていません'); return; }

    const { data: pageData } = await sb
      .from('site_pages')
      .select('title, blocks, is_members_only')
      .eq('slug', slug)
      .single();

    if (!pageData) { showError('ページが見つかりません'); return; }

    // 会員限定ページのアクセス制御
    if (pageData.is_members_only && !user) {
      showError('このページは会員限定です。ログインしてください。');
      return;
    }

    document.title = pageData.title + ' | ' + (document.getElementById('site-name').textContent);
    document.getElementById('page').innerHTML = renderBlocks(pageData.blocks);
  }

  function showError(msg) {
    document.getElementById('page').innerHTML =
      `<div class="container" style="padding:4rem 1.5rem;text-align:center;">
         <p style="color:var(--muted);font-size:1.1rem;">${msg}</p>
         <a href="index.html" class="btn btn-primary" style="margin-top:1.5rem;">トップへ戻る</a>
       </div>`;
  }

  init();
  </script>
</body>
</html>
